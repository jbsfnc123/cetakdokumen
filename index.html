<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBG Suci - Mobile System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb; --primary-hover: #1d4ed8;
            --bg-body: #f3f4f6; --bg-panel: #ffffff;
            --text-main: #1f2937; --text-muted: #6b7280;
            --border: #e5e7eb; --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Navbar */
        .navbar { height: 60px; background: var(--bg-panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 10; flex-shrink: 0; }
        .app-title { font-size: 1.1rem; font-weight: 700; }
        .nav-right button { font-size: 0.8rem; }

        /* Layout Utama */
        .main-container { display: flex; flex: 1; overflow: hidden; position: relative; }
        .left-panel { width: 400px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 5; flex-shrink: 0; }
        .right-panel { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg-body); display: flex; flex-direction: column; gap: 20px; }
        .resizer { width: 5px; background: #e5e7eb; cursor: col-resize; z-index: 6; }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .main-container { flex-direction: column; overflow-y: auto; } /* Allow body scroll on mobile */
            .left-panel { width: 100%; border-right: none; border-bottom: 1px solid var(--border); height: auto; flex-shrink: 0; }
            .right-panel { width: 100%; height: auto; overflow: visible; }
            .resizer { display: none; }
            .navbar { padding: 0 10px; }
            .app-title { font-size: 1rem; }
            /* Hide non-essential buttons on mobile navbar if needed */
        }

        /* Components */
        .btn { padding: 8px 12px; border-radius: 6px; border: 1px solid transparent; font-size: 0.875rem; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-outline { background: white; border-color: var(--border); color: var(--text-main); }
        .btn-danger { background: #fef2f2; color: var(--danger); border-color: #fecaca; }
        .full-width { width: 100%; }

        /* Header Input Section */
        .global-input-section { padding: 15px; background: #eff6ff; border-bottom: 1px solid #bfdbfe; }
        .section-title { font-size: 0.75rem; font-weight: 700; color: var(--primary); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.05em; }
        
        .form-card { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 10px; position: relative; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .col-span-2 { grid-column: span 2; }
        
        .form-group label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }
        .form-control { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.9rem; }
        .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(37,99,235,0.1); }

        /* Dashboard Elements */
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 10px; }
        .mode-toggle { display: flex; background: #e5e7eb; padding: 3px; border-radius: 6px; }
        .mode-btn { padding: 6px 12px; font-size: 0.85rem; border-radius: 4px; border: none; cursor: pointer; font-weight: 600; color: var(--text-muted); }
        .mode-btn.active { background: white; color: var(--primary); shadow: 0 1px 2px rgba(0,0,0,0.1); }

        .table-container { background: white; border-radius: 8px; border: 1px solid var(--border); overflow-x: auto; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 600px; }
        th, td { padding: 10px 15px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #f9fafb; font-weight: 600; color: var(--text-muted); white-space: nowrap; }
        .col-money { text-align: right; font-family: monospace; font-weight: 600; }
        
        /* Loading & Status */
        #loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:999; display:none; justify-content:center; align-items:center; flex-direction:column; }
        .spinner { width: 30px; height: 30px; border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Empty State */
        .empty-state { padding: 30px; text-align: center; color: var(--text-muted); font-style: italic; }
        
        .highlight-banner { background: #fefce8; border: 1px solid #fde047; padding: 10px; border-radius: 6px; font-size: 0.85rem; color: #854d0e; display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }

        /* Filter Section for History */
        .filter-box { background: white; padding: 15px; border-radius: 8px; border: 1px solid var(--border); display: flex; gap: 10px; flex-wrap: wrap; align-items: end; margin-bottom: 15px; }
    </style>
</head>
<body>
    
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top:10px; font-weight:500;">Memproses...</p>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="app-title">MBG Suci</div>
        <div class="nav-right">
            <input type="file" id="excelFile" accept=".xlsx" style="display:none">
            <button class="btn btn-outline" onclick="document.getElementById('excelFile').click()">📂 Import Master</button>
        </div>
    </nav>

    <div class="main-container">
        <!-- PANEL KIRI: INPUT -->
        <div class="left-panel">
            
            <!-- 1. HEADER INFO PENGIRIMAN (GLOBAL INPUT) -->
            <div class="global-input-section">
                <div class="section-title">1. Informasi Pengiriman</div>
                <div class="form-grid">
                    <div class="form-group col-span-2">
                        <label>Tujuan Pengiriman</label>
                        <select id="global-tujuan" class="form-control" style="font-weight: bold; color: var(--primary);">
                            <option value="">-- Pilih Tujuan --</option>
                            <option value="Sekolah">Sekolah</option>
                            <option value="Posyandu">Posyandu</option>
                        </select>
                    </div>
                    <div class="form-group col-span-2">
                        <label>Tanggal Kirim</label>
                        <input type="date" id="global-tanggal" class="form-control">
                    </div>
                </div>
            </div>

            <!-- 2. TAB MENU -->
            <div style="padding: 10px 15px; background: #f9fafb; border-bottom: 1px solid var(--border);">
                <div class="section-title">2. Input Bahan Baku</div>
                <div style="display: flex; gap: 5px;">
                    <button class="btn btn-primary full-width" id="btn-tab-income" onclick="switchTab('income')">Uang Masuk</button>
                    <button class="btn btn-outline full-width" id="btn-tab-expense" onclick="switchTab('expense')">Uang Keluar</button>
                </div>
            </div>

            <!-- 3. FORM INPUT ITEM -->
            <div class="input-content" style="flex: 1; overflow-y: auto; padding: 15px;">
                <div id="input-form-container">
                    <!-- Dynamic Row will be inserted here -->
                </div>
            </div>

            <!-- 4. ACTION BUTTONS -->
            <div style="padding: 15px; border-top: 1px solid var(--border); background: white;">
                <button class="btn btn-outline full-width" onclick="addToSession()">⬇️ Tambah ke List (Draft)</button>
            </div>
        </div>

        <!-- PANEL KANAN: DASHBOARD & PREVIEW -->
        <div class="right-panel">
            
            <div class="dashboard-header">
                <div class="mode-toggle">
                    <button class="mode-btn active" id="mode-draft" onclick="switchViewMode('draft')">Draft Saat Ini</button>
                    <button class="mode-btn" id="mode-history" onclick="switchViewMode('history')">Riwayat Database</button>
                </div>
                <div id="draft-actions">
                    <button class="btn btn-success" onclick="saveToSupabase()">✅ Upload Semua ke Database</button>
                </div>
            </div>

            <!-- VIEW: DRAFT / CURRENT SESSION -->
            <div id="view-draft">
                <div class="highlight-banner" id="draft-banner">
                    <span>📝 Data ini baru disimpan di cache (belum masuk database). Klik tombol hijau untuk menyimpan.</span>
                </div>
                
                <div class="table-container">
                    <div style="padding: 10px 15px; background: #f0fdf4; border-bottom: 1px solid var(--border); color: #166534; font-weight: 600;">
                        Draft Uang Masuk
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Item</th>
                                <th>Qty</th>
                                <th>Harga</th>
                                <th class="col-money">Total</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="draft-income-body"></tbody>
                    </table>
                </div>
                <br>
                <div class="table-container">
                    <div style="padding: 10px 15px; background: #fef2f2; border-bottom: 1px solid var(--border); color: #991b1b; font-weight: 600;">
                        Draft Uang Keluar
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Item</th>
                                <th>Qty</th>
                                <th>Harga</th>
                                <th class="col-money">Total</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="draft-expense-body"></tbody>
                    </table>
                </div>
            </div>

            <!-- VIEW: HISTORY / DATABASE -->
            <div id="view-history" style="display: none;">
                <div class="filter-box">
                    <div class="form-group">
                        <label>Filter Tujuan</label>
                        <select id="filter-tujuan" class="form-control">
                            <option value="all">Semua</option>
                            <option value="Sekolah">Sekolah</option>
                            <option value="Posyandu">Posyandu</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Filter Tanggal</label>
                        <input type="date" id="filter-tanggal" class="form-control">
                    </div>
                    <button class="btn btn-primary" onclick="fetchHistory()">Cari Data</button>
                    <button class="btn btn-outline" onclick="exportToExcel()">Export Excel</button>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Tgl</th>
                                <th>Tujuan</th>
                                <th>Tipe</th>
                                <th>Item</th>
                                <th>Qty</th>
                                <th class="col-money">Total</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="history-body"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        // ==========================================
        // KONFIGURASI SUPABASE
        // ==========================================
        const SUPABASE_URL = "https://ebrfayeiattzgcbjolvb.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVicmZheWVpYXR0emdjYmpvbHZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkyODM2ODMsImV4cCI6MjA4NDg1OTY4M30.pdCeX5j1MG48yGWxc48-maOi8QzkX8ZqkPKrJz3Cuus";
        
        let _supabase = null;
        try {
            if (typeof supabase !== 'undefined' && !SUPABASE_URL.includes("MASUKKAN")) {
                _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
        } catch (e) { console.error("Supabase Error", e); }
        // ==========================================

        // STATE
        let currentTab = 'income';
        let masterIncome = [];
        let masterExpense = [];
        
        // CACHE DATA (Session)
        let sessionData = []; // [{tujuan, date, name, qty, price, total, type, unit}, ...]

        // HISTORY DATA (Database)
        let historyData = [];

        window.onload = function() {
            renderInputForm();
            // Set default date hari ini
            document.getElementById('global-tanggal').valueAsDate = new Date();
            document.getElementById('filter-tanggal').valueAsDate = new Date();
            
            // Cek import status
            const hasData = localStorage.getItem('hasMasterData');
            if(hasData) document.getElementById('import-alert')?.remove();
        };

        // --- 1. LOGIC INPUT & UI ---
        
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('btn-tab-income').className = tab === 'income' ? 'btn btn-primary full-width' : 'btn btn-outline full-width';
            document.getElementById('btn-tab-expense').className = tab === 'expense' ? 'btn btn-primary full-width' : 'btn btn-outline full-width';
            renderInputForm();
        }

        function renderInputForm() {
            const container = document.getElementById('input-form-container');
            const isIncome = currentTab === 'income';
            const masterList = isIncome ? masterIncome : masterExpense;
            
            let options = '<option value="">-- Pilih Item --</option>';
            if(masterList.length > 0) {
                masterList.forEach((m, i) => options += `<option value="${i}">${m.name}</option>`);
            }
            options += '<option value="custom">+ Manual</option>';

            container.innerHTML = `
                <div class="form-card" id="active-form">
                    <div class="form-group" style="margin-bottom:10px;">
                        <label>Nama Item / Bahan Baku</label>
                        <select class="form-control" id="inp-item" onchange="onItemSelect(this, ${isIncome})">${options}</select>
                        <input type="text" class="form-control" id="inp-custom" style="display:none; margin-top:5px;" placeholder="Ketik nama item...">
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Satuan</label>
                            <input type="text" class="form-control" id="inp-unit" readonly>
                        </div>
                        <div class="form-group">
                            <label>Harga</label>
                            <input type="number" class="form-control" id="inp-price" readonly>
                        </div>
                        <div class="form-group col-span-2">
                            <label>Jumlah (Qty)</label>
                            <input type="number" class="form-control" id="inp-qty" placeholder="0" oninput="calcTotal()">
                        </div>
                        <div class="form-group col-span-2" style="text-align:right;">
                            <span id="txt-total" style="font-size:1.2rem; font-weight:bold; color:var(--primary);">Rp 0</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function onItemSelect(sel, isIncome) {
            const val = sel.value;
            const customInp = document.getElementById('inp-custom');
            const priceInp = document.getElementById('inp-price');
            const unitInp = document.getElementById('inp-unit');

            if(val === 'custom') {
                customInp.style.display = 'block';
                priceInp.readOnly = false; priceInp.value = '';
                unitInp.readOnly = false; unitInp.value = '';
                customInp.focus();
            } else if (val !== '') {
                customInp.style.display = 'none';
                const list = isIncome ? masterIncome : masterExpense;
                const data = list[val];
                priceInp.value = data.price; priceInp.readOnly = true;
                unitInp.value = isIncome ? 'Porsi' : data.unit; unitInp.readOnly = true;
                document.getElementById('inp-qty').focus();
            }
            calcTotal();
        }

        function calcTotal() {
            const p = parseFloat(document.getElementById('inp-price').value) || 0;
            const q = parseFloat(document.getElementById('inp-qty').value) || 0;
            document.getElementById('txt-total').textContent = formatRupiah(p * q);
        }

        // --- 2. LOGIC CACHE / SESSION ---

        function addToSession() {
            // 1. Validasi Global Input
            const tujuan = document.getElementById('global-tujuan').value;
            const tanggal = document.getElementById('global-tanggal').value;

            if(!tujuan || !tanggal) {
                alert("⚠️ Mohon isi TUJUAN dan TANGGAL KIRIM di bagian atas dulu.");
                window.scrollTo(0,0);
                return;
            }

            // 2. Ambil Data Form
            const itemSel = document.getElementById('inp-item');
            let name = "";
            if(itemSel.value === 'custom') name = document.getElementById('inp-custom').value;
            else if(itemSel.value !== '') name = itemSel.options[itemSel.selectedIndex].text;

            const qty = parseFloat(document.getElementById('inp-qty').value) || 0;
            const price = parseFloat(document.getElementById('inp-price').value) || 0;
            const unit = document.getElementById('inp-unit').value;
            
            if(!name || qty <= 0) {
                alert("Mohon lengkapi item dan jumlah qty.");
                return;
            }

            // 3. Push ke Session Array
            const newItem = {
                id_temp: Date.now(), // ID sementara
                tujuan: tujuan,
                date: tanggal, // Ini adalah Tanggal Kirim
                name: name,
                qty: qty,
                unit: unit,
                price: price,
                total: price * qty,
                type: currentTab // 'income' or 'expense'
            };

            sessionData.push(newItem);
            
            // 4. Reset Input (Kecuali Global)
            renderInputForm();
            renderDraftTables();
            
            // Toast / Feedback sederhana
            const btn = document.querySelector('.left-panel .btn-outline');
            const originalText = btn.innerText;
            btn.innerText = "✅ Masuk List!";
            setTimeout(() => btn.innerText = originalText, 1000);
        }

        function removeFromSession(id_temp) {
            sessionData = sessionData.filter(x => x.id_temp !== id_temp);
            renderDraftTables();
        }

        function renderDraftTables() {
            const incBody = document.getElementById('draft-income-body');
            const expBody = document.getElementById('draft-expense-body');
            incBody.innerHTML = ''; expBody.innerHTML = '';

            const incomeItems = sessionData.filter(x => x.type === 'income');
            const expenseItems = sessionData.filter(x => x.type === 'expense');

            function renderRow(item) {
                return `
                    <tr>
                        <td>
                            <div style="font-weight:600;">${item.name}</div>
                            <div style="font-size:0.75rem; color:#666;">${item.tujuan} (${formatDate(item.date)})</div>
                        </td>
                        <td>${item.qty} ${item.unit}</td>
                        <td>${formatRupiah(item.price)}</td>
                        <td class="col-money">${formatRupiah(item.total)}</td>
                        <td><button class="btn btn-danger" style="padding:4px 8px; font-size:0.7rem;" onclick="removeFromSession(${item.id_temp})">Hapus</button></td>
                    </tr>
                `;
            }

            if(incomeItems.length === 0) incBody.innerHTML = '<tr><td colspan="5" class="empty-state">Belum ada inputan</td></tr>';
            else incomeItems.forEach(i => incBody.innerHTML += renderRow(i));

            if(expenseItems.length === 0) expBody.innerHTML = '<tr><td colspan="5" class="empty-state">Belum ada inputan</td></tr>';
            else expenseItems.forEach(i => expBody.innerHTML += renderRow(i));
        }

        // --- 3. DATABASE ACTION ---

        async function saveToSupabase() {
            if(!_supabase) return alert("Konfigurasi Supabase belum diset!");
            if(sessionData.length === 0) return alert("List draft kosong. Input data dulu.");

            if(!confirm(`Yakin simpan ${sessionData.length} item ke database?`)) return;

            showLoading(true);

            // Bersihkan object dari properti temp sebelum kirim DB
            const dataToInsert = sessionData.map(({id_temp, ...rest}) => rest);

            const { error } = await _supabase.from('transaksi').insert(dataToInsert);

            showLoading(false);

            if(error) {
                alert("Gagal simpan: " + error.message);
            } else {
                alert("Sukses! Data tersimpan di Database.");
                sessionData = []; // Clear cache
                renderDraftTables();
            }
        }

        // --- 4. HISTORY & VIEW MODE ---

        function switchViewMode(mode) {
            document.getElementById('mode-draft').className = mode === 'draft' ? 'mode-btn active' : 'mode-btn';
            document.getElementById('mode-history').className = mode === 'history' ? 'mode-btn active' : 'mode-btn';
            
            document.getElementById('view-draft').style.display = mode === 'draft' ? 'block' : 'none';
            document.getElementById('view-history').style.display = mode === 'history' ? 'block' : 'none';
            document.getElementById('draft-actions').style.display = mode === 'draft' ? 'block' : 'none';
        }

        async function fetchHistory() {
            if(!_supabase) return alert("Supabase belum dikonfigurasi");
            
            const tujuan = document.getElementById('filter-tujuan').value;
            const tanggal = document.getElementById('filter-tanggal').value;

            showLoading(true);

            let query = _supabase.from('transaksi').select('*').order('created_at', {ascending: false});

            if(tujuan !== 'all') query = query.eq('tujuan', tujuan);
            if(tanggal) query = query.eq('date', tanggal);

            const { data, error } = await query;
            
            showLoading(false);

            if(error) {
                alert("Error fetch: " + error.message);
            } else {
                historyData = data;
                renderHistoryTable();
            }
        }

        function renderHistoryTable() {
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = '';
            
            if(historyData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state">Data tidak ditemukan</td></tr>';
                return;
            }

            historyData.forEach(item => {
                const badgeColor = item.type === 'income' ? 'background:#dcfce7; color:#166534;' : 'background:#fee2e2; color:#991b1b;';
                tbody.innerHTML += `
                    <tr>
                        <td>${formatDate(item.date)}</td>
                        <td>${item.tujuan || '-'}</td>
                        <td><span style="font-size:0.7rem; padding:2px 6px; border-radius:4px; ${badgeColor}">${item.type === 'income' ? 'Masuk' : 'Keluar'}</span></td>
                        <td>${item.name}</td>
                        <td>${item.qty} ${item.unit}</td>
                        <td class="col-money">${formatRupiah(item.total)}</td>
                        <td>
                            <button class="btn btn-danger" style="padding:2px 6px; font-size:0.7rem;" onclick="deleteHistory(${item.id})">Hapus</button>
                        </td>
                    </tr>
                `;
            });
        }

        async function deleteHistory(id) {
            if(!confirm("Hapus data permanen dari database?")) return;
            
            showLoading(true);
            const { error } = await _supabase.from('transaksi').delete().eq('id', id);
            
            if(!error) {
                // Remove from local array too
                historyData = historyData.filter(x => x.id !== id);
                renderHistoryTable();
            } else {
                alert("Gagal hapus: " + error.message);
            }
            showLoading(false);
        }

        // --- EXCEL IMPORT ---
        document.getElementById('excelFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                if(wb.Sheets["Uang Masuk"]) {
                    const raw = XLSX.utils.sheet_to_json(wb.Sheets["Uang Masuk"], {header:1});
                    masterIncome = raw.slice(1).map(r => ({name: r[0], price: r[1]||0})).filter(x=>x.name);
                }
                if(wb.Sheets["Uang Keluar"]) {
                    const raw = XLSX.utils.sheet_to_json(wb.Sheets["Uang Keluar"], {header:1});
                    masterExpense = raw.slice(1).map(r => ({name: r[0], unit: r[1]||'-', price: r[2]||0})).filter(x=>x.name);
                }
                localStorage.setItem('hasMasterData', 'true');
                alert(`Import Berhasil! ${masterIncome.length} Item Masuk, ${masterExpense.length} Item Keluar.`);
                renderInputForm();
            };
            reader.readAsArrayBuffer(file);
        });
        
        function exportToExcel() {
            if(historyData.length === 0) return alert("Tidak ada data riwayat untuk diexport. Lakukan pencarian dulu.");
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.json_to_sheet(historyData);
            XLSX.utils.book_append_sheet(wb, ws, "Laporan");
            XLSX.writeFile(wb, "MBG_Suci_Export.xlsx");
        }

        // UTILS
        function formatRupiah(n) { return new Intl.NumberFormat('id-ID', {style:'currency', currency:'IDR', minimumFractionDigits:0}).format(n); }
        function formatDate(d) { if(!d) return '-'; const dd = new Date(d); return `${dd.getDate()}/${dd.getMonth()+1}/${dd.getFullYear()}`; }
        function showLoading(s) { document.getElementById('loading-overlay').style.display = s ? 'flex' : 'none'; }

    </script>
</body>
